name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  panel-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: panel-api/go.mod
      - run: go build ./...
        working-directory: panel-api
      - run: go vet ./...
        working-directory: panel-api
      - run: go test ./... -race
        working-directory: panel-api

  node-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: node-agent/go.mod
      - run: go build ./...
        working-directory: node-agent
      - run: go vet ./...
        working-directory: node-agent
      - run: go test ./... -race
        working-directory: node-agent

  skyperf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
        working-directory: skyperf
      - run: cargo test
        working-directory: skyperf

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run typecheck
        working-directory: web
      - run: npm run test
        working-directory: web
      - run: npm run build
        working-directory: web

  site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json
      - run: npm ci
        working-directory: site
      - run: npm run lint
        working-directory: site
      - run: npm run build
        working-directory: site
