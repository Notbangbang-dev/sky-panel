name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: panel-api/go.mod

      - run: mkdir -p dist

      - name: Build panel-api (linux/amd64, linux/arm64)
        working-directory: panel-api
        env:
          CGO_ENABLED: 0
        run: |
          GOOS=linux GOARCH=amd64 go build -o ../dist/panel-api-linux-amd64 ./cmd/panel-api
          GOOS=linux GOARCH=arm64 go build -o ../dist/panel-api-linux-arm64 ./cmd/panel-api

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web dist
        working-directory: web
        # VITE_API_URL is inlined at build time. Released web assets are
        # served by Caddy from the same origin as panel-api (see
        # installer/install.sh's Caddyfile), so an empty string here makes
        # every request same-origin/relative instead of the local-dev
        # default of an absolute http://localhost:8080 — which would only
        # ever work on the machine loading the page, not the server.
        env:
          VITE_API_URL: ""
        run: |
          npm ci
          npm run build
          tar -czf ../dist/web-dist.tar.gz -C dist .

      - name: Checksums
        working-directory: dist
        run: sha256sum * > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
